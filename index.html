<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠色網購：循環包材教學課程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step-card { display: none; }
        .step-card.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">綠色網購教學系統</h1>
            <span id="progress" class="text-sm bg-green-700 px-3 py-1 rounded-full">進度: 1/5</span>
        </div>
    </nav>

    <div class="container mx-auto max-w-2xl mt-10 p-6 bg-white rounded-xl shadow-md">
        
        <div id="step1" class="step-card active">
            <h2 class="text-2xl font-bold mb-4 text-green-700">我們能不能只要商品，不要垃圾？</h2>
            <div class="bg-gray-200 h-48 rounded-lg mb-4 flex items-center justify-center text-gray-500 italic text-center p-4">
                [ 這裡可以嵌入你拆解網購包材的影片或對比圖 ]<br>巨大的紙箱 vs 極小的商品
            </div>
            <p class="mb-6 leading-relaxed">每年網購產生超過萬噸的廢棄包材，泡泡紙、破壞袋... 這些真的必要嗎？</p>
            <button onclick="nextStep(2)" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">開始學習任務</button>
        </div>

        <div id="step2" class="step-card">
            <h2 class="text-2xl font-bold mb-4 text-green-700">循環包材：領、收、還</h2>
            <p class="mb-4 text-sm text-gray-600 underline">互動任務：請依序點擊步驟了解詳情</p>
            <div class="space-y-3">
                <button onclick="alert('步驟 1：在訂購時選擇使用「循環包裝袋」。')" class="w-full p-4 border-2 border-green-200 rounded-lg text-left hover:bg-green-50">1. 選用 (訂購介面勾選)</button>
                <button onclick="alert('步驟 2：收到商品後，取出內容物，保留完整包裝袋。')" class="w-full p-4 border-2 border-green-200 rounded-lg text-left hover:bg-green-50">2. 收貨 (領取與拆封)</button>
                <button onclick="alert('步驟 3：至超商或自動歸還機，掃碼並投入。')" class="w-full p-4 border-2 border-green-200 rounded-lg text-left hover:bg-green-50">3. 歸還 (完成環保循環)</button>
            </div>
            <button onclick="nextStep(3)" class="mt-8 w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">我了解流程了，下一步</button>
        </div>

        <div id="step3" class="step-card">
            <h2 class="text-2xl font-bold mb-4 text-green-700">模擬操作測試</h2>
            <p class="mb-4">現在你要結帳了，你會選擇哪種包裝？</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showFeedback(false)" class="p-4 border rounded-lg hover:bg-red-50">一般塑膠破壞袋<br><span class="text-xs text-gray-400">(不可回收)</span></button>
                <button onclick="showFeedback(true)" class="p-4 border border-green-500 rounded-lg hover:bg-green-50 text-green-700 font-bold">環保循環包裝袋<br><span class="text-xs text-green-600">(可重複使用)</span></button>
            </div>
            <div id="feedback" class="mt-6 p-4 rounded-lg hidden"></div>
            <button id="nextBtn3" onclick="nextStep(4)" class="mt-6 w-full bg-gray-400 text-white py-3 rounded-lg font-bold hidden">繼續課程</button>
        </div>

        <div id="step4" class="step-card">
            <h2 class="text-2xl font-bold mb-4 text-green-700">你的影響力</h2>
            <div class="bg-green-50 p-6 rounded-lg border-l-4 border-green-600 mb-6">
                <p class="text-lg">全台灣若能普及使用，一年可節省的碳排放量相當於 <strong>100 萬棵樹</strong> 的吸碳量！</p>
            </div>
            <p class="mb-6">下次網購時，別忘了尋找循環包材的選項喔！</p>
            <button onclick="nextStep(5)" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">進入最終測驗</button>
        </div>

        <div id="step5" class="step-card">
            <h2 class="text-2xl font-bold mb-4 text-green-700">知識小測驗</h2>
            <p class="mb-4">以下哪一種是循環包材的正確優點？</p>
            <div class="space-y-3">
                <label class="block p-4 border rounded-lg cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="quiz" value="a"> A. 使用一次就可以丟掉
                </label>
                <label class="block p-4 border rounded-lg cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="quiz" value="b"> B. 透過歸還系統重複利用，減少廢棄物
                </label>
            </div>
            <button onclick="checkQuiz()" class="mt-6 w-full bg-yellow-500 text-white py-3 rounded-lg font-bold hover:bg-yellow-600">提交答案</button>
        </div>

    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step-card').forEach(card => card.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.getElementById('progress').innerText = `進度: ${step}/5`;
        }

        function showFeedback(isCorrect) {
            const fb = document.getElementById('feedback');
            const btn = document.getElementById('nextBtn3');
            fb.classList.remove('hidden');
            if(isCorrect) {
                fb.className = "mt-6 p-4 rounded-lg bg-green-100 text-green-700 border border-green-300";
                fb.innerHTML = "<strong>太棒了！</strong> 選擇循環包裝能減少 500g 碳排放。這就是 ARCS 模型中的『滿意度』提升！";
                btn.classList.remove('hidden', 'bg-gray-400');
                btn.classList.add('bg-green-600');
            } else {
                fb.className = "mt-6 p-4 rounded-lg bg-red-100 text-red-700 border border-red-300";
                fb.innerHTML = "再想一下！傳統包材會造成嚴重的環境負擔喔。";
            }
        }

        function checkQuiz() {
            const selected = document.querySelector('input[name="quiz"]:checked');
            if (selected && selected.value === 'b') {
                alert('恭喜你！完全掌握了循環包材的核心概念！\n這份數位教材設計成功！');
                location.reload(); // 重新開始
            } else {
                alert('再試試看，選擇最環保的那個選項！');
            }
        }
    </script>
</body>
</html>
