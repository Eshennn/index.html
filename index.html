<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育科技專題：賣家綠色出貨決策系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7faf8; }
        
        .page-content { display: none; opacity: 0; transform: translateY(15px); }
        .page-content.active { display: block; opacity: 1; transform: translateY(0); transition: all 0.5s ease; }
        
        .nav-link.active { background-color: #065f46; color: white; border-radius: 12px; }
        .wide-container { max-width: 1400px; margin: 0 auto; width: 94%; }
        
        .option-card { background: white; border-radius: 2rem; border: 1px solid #e5e7eb; transition: 0.3s; position: relative; overflow: hidden; }
        .option-card:hover { transform: translateY(-8px); border-color: #10b981; box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        
        .price-badge { background: #065f46; color: white; padding: 4px 14px; border-radius: 99px; font-weight: 800; font-size: 0.85rem; }
        .compare-table tr { border-bottom: 1px solid #edf2f7; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-12">

    <nav class="bg-white/95 backdrop-blur-md sticky top-0 z-50 border-b border-green-100 px-8 py-5">
        <div class="wide-container flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-green-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div class="flex flex-col">
                    <span class="font-black text-xl text-slate-800 leading-none">教育科技專題</span>
                    <span class="text-[10px] font-bold text-green-600 tracking-widest mt-1 uppercase">Sustainable Packaging</span>
                </div>
            </div>
            <div class="hidden md:flex gap-1 font-bold text-slate-600 bg-slate-100 p-1.5 rounded-2xl">
                <button onclick="showPage('home')" id="link-home" class="nav-link active px-6 py-2.5 transition">首頁</button>
                <button onclick="showPage('compare')" id="link-compare" class="nav-link px-6 py-2.5 transition">包材對比詳解</button>
                <button onclick="showPage('carbon')" id="link-carbon" class="nav-link px-6 py-2.5 transition">減碳數據</button>
                <button onclick="showPage('game')" id="link-game" class="nav-link px-6 py-2.5 transition">出貨模擬</button>
                <button onclick="showPage('test')" id="link-test" class="nav-link px-6 py-2.5 transition text-emerald-700">學習評量</button>
            </div>
        </div>
    </nav>

    <main class="wide-container mt-10 flex-grow">

        <div id="page-home" class="page-content active">
            <div class="bg-gradient-to-br from-green-900 to-green-700 p-16 md:p-24 text-white rounded-[3rem] shadow-2xl flex flex-col md:flex-row items-center gap-16">
                <div class="md:w-3/5">
                    <h1 class="text-5xl md:text-6xl font-black mb-8 leading-tight">賣家出貨新標準：<br><span class="text-green-300">環保、經濟、高效</span></h1>
                    <p class="text-xl opacity-90 mb-10 leading-relaxed">
                        選擇對的包材，能為你的店鋪省下隱形成本，更能在消費者心中建立高品質的綠色品牌形象。
                    </p>
                    <button onclick="showPage('compare')" class="bg-white text-green-900 px-10 py-4 rounded-xl font-black hover:bg-green-50 shadow-xl transition">進入包材對比中心</button>
                </div>
                <div class="md:w-2/5 text-center text-[10rem] drop-shadow-2xl">🌿</div>
            </div>
        </div>

        <div id="page-compare" class="page-content">
            <div class="bg-white p-10 rounded-[3rem] shadow-sm mb-12 border border-slate-100">
                <h3 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3">
                    <i class="fa-solid fa-scale-balanced text-green-600"></i> 包材對比分析表
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left compare-table">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-sm uppercase">
                                <th class="p-4">包材類型</th>
                                <th class="p-4">傳統材質 (高碳排)</th>
                                <th class="p-4">環保材質 (推薦)</th>
                                <th class="p-4">主要轉型優勢</th>
                            </tr>
                        </thead>
                        <tbody class="text-slate-700 font-bold">
                            <tr>
                                <td class="p-5">外包裝</td>
                                <td class="p-5 text-red-500">塑膠破壞袋</td>
                                <td class="p-5 text-green-600">循環袋 / 生物分解袋</td>
                                <td class="p-5 text-sm font-medium">降低塑膠垃圾、可重複利用</td>
                            </tr>
                            <tr>
                                <td class="p-5">防撞緩衝</td>
                                <td class="p-5 text-red-500">氣泡布 / 保麗龍</td>
                                <td class="p-5 text-green-600">蜂巢紙 / 澱粉發泡</td>
                                <td class="p-5 text-sm font-medium">100% 自然分解、減少倉儲空間</td>
                            </tr>
                            <tr>
                                <td class="p-5">封箱固定</td>
                                <td class="p-5 text-red-500">OPP 塑膠膠帶</td>
                                <td class="p-5 text-green-600">水性牛皮紙膠帶</td>
                                <td class="p-5 text-sm font-medium">不影響紙箱回收純淨度</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
